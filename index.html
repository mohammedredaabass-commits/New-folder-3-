<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="MO1.CSS">

</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h1>MO-GENIX</h1>

            <p>Welcome Back 👋</p>

            <form id="loginForm">

                <label>Username</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter your username"
                    required
                >

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

    <script src="MO1.JS"></script>

</body>

</html>
